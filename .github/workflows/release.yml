name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
    
    - name: Build
      run: go build -o watusi-bridge.exe main.go
    
    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        files: watusi-bridge.exe
        generate_release_notes: true