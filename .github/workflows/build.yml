name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'
    
    - name: Build
      run: go build -o watusi-bridge.exe .
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: watusi-bridge-windows
        path: watusi-bridge.exe